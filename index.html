<!DOCTYPE html>
<html>

<head>
    <title>Travel Planner</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            margin: 0;
            padding: 40px;
        }

        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        h1 {
            text-align: center;
            color: #1f2937;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 15px;
            font-size: 16px;
            border-radius: 10px;
            border: 1px solid #ccc;
            resize: none;
        }

        button {
            margin-top: 15px;
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            background: #2563eb;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        .output {
            margin-top: 25px;
            background: #f9fafb;
            padding: 20px;
            border-radius: 10px;
            white-space: pre-wrap;
            line-height: 1.6;
        }

        .loading {
            color: #2563eb;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Travel Planner</h1>

        <textarea id="prompt"
            placeholder="Example: Plan a trip from Denver to San Diego from 2022-04-10 to 2022-04-12 within a budget of 5000."></textarea>

        <button onclick="sendPrompt()">Generate Plan</button>

        <div id="loading" class="loading"></div>
        <div id="output" class="output"></div>
    </div>

    <script>
        async function sendPrompt() {
            const prompt = document.getElementById("prompt").value;
            const output = document.getElementById("output");
            const loading = document.getElementById("loading");

            if (!prompt.trim()) {
                output.innerText = "Please enter a prompt.";
                return;
            }

            output.innerText = "";
            loading.innerText = "Generating response...";

            try {
                const response = await fetch("http://127.0.0.1:8000/chat", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        message: prompt
                    })
                });

                const data = await response.json();

                loading.innerText = "";

                if (data.answer) {
                    output.innerText = data.answer;
                } else if (data.detail) {
                    output.innerText = "Error: " + data.detail;
                } else {
                    output.innerText = "Unexpected response.";
                }

            } catch (error) {
                loading.innerText = "";
                output.innerText = "Could not connect to backend. Make sure FastAPI server is running.";
            }
        }
    </script>

</body>

</html>
